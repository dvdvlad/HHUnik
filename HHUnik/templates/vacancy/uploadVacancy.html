{% extends 'base.html' %} 
{% block content %}
<div style="margin-bottom: 20px; width: 100%;" class="card">
    <label class="form-label" style="color: #0070ba; display: block; margin-bottom: 10px;">
        Выберите или перетащите один или несколько файлов:
    </label>
    
    <!-- Интерактивная drop-зона во всю ширину -->
    <label for="fileInput" class="drop-zone">
        <span class="drop-zone-text">Нажмите или перетащите PDF файлы сюда</span>
        <input type="file" name="resumes" id="fileInput" multiple accept=".pdf">
    </label>
</div>
<script>
const dropZone = document.querySelector('.drop-zone');
const fileInput = document.getElementById('fileInput');
const dropZoneText = document.querySelector('.drop-zone-text');

// Подсветка при перетаскивании файла над зоной
['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    }, false);
});

// Убираем подсветку, если файл увели из зоны или сбросили
['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
    }, false);
});

// Обработка самого сброса файла (передача файлов в input)
dropZone.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    const files = dt.files;
    fileInput.files = files;
    
    // Меняем текст на количество выбранных файлов
    updateText();
});

// Изменение текста при обычном клике и выборе через окно
fileInput.addEventListener('change', () => {
    updateText();
});

function updateText() {
    if (fileInput.files.length > 0) {
        dropZoneText.innerText = `Выбрано файлов: ${fileInput.files.length}`;
        dropZoneText.style.color = '#0070ba';
        dropZoneText.style.fontWeight = 'bold';
    } else {
        dropZoneText.innerText = 'Нажмите или перетащите PDF файлы сюда';
        dropZoneText.style.color = '#555';
        dropZoneText.style.fontWeight = 'normal';
    }
}</script>
{% endblock %}
