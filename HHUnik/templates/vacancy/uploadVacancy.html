<!-- upload_resumes.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Загрузка резюме</title>
</head>
<body>
    <h2>Загрузка нескольких PDF</h2>
    
    <form id="uploadForm">
        {% csrf_token %}
        <input type="file" name="resumes" id="fileInput" multiple accept=".pdf">
        <button type="submit" id="submitBtn">Загрузить в базу</button>
    </form>

    <div id="status" style="margin-top: 20px;"></div>

    <script>
        const form = document.getElementById('uploadForm');
        const statusDiv = document.getElementById('status');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            statusDiv.innerHTML = "<b>Загрузка и обработка... Пожалуйста, подождите.</b>";
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch("", { // Отправляем на тот же URL
                    method: 'POST',
                    body: formData,
                    headers: {
                        "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
                    }
                });
                
                const result = await response.json();
                if (result.success) {
                    statusDiv.innerHTML = `<span style="color: green;">Успешно! Обработано файлов: ${result.count_uploaded}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color: red;">Произошла ошибка при загрузке.</span>';
            } finally {
                document.getElementById('submitBtn').disabled = false;
            }
        };
    </script>
</body>
</html>
