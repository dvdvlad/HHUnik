{% extends 'base.html' %} {% block content%}
<h1>Авторизация</h1>
<form method="post">
    {% csrf_token %} 
    {% for f in form %}
    <p ><label class="form-label" for="{{ f.id_for_label }}">{{f.label}}: </label>{{ f }}</p>
    {% endfor %}
    <p><button type="submit">Войти</button></p>

</form>
{% endblock %}
