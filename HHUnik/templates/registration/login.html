{% extends 'base.html' %} {% block content%}
<div class="content">
    <h1>Авторизация</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-error">{{ form.non_field_errors }}</div>
        {% for f in form %}
        <p>
            <label class="form-label" for="{{ f.id_for_label }}"
                >{{f.label}}:
            </label>
            {{ f }}
        </p>
        <div class="field-error" style="color: red">{{ f.errors }}</div>
        {% endfor %}
        <p><button type="submit">Войти</button></p>
    </form>
</div>
{% endblock %}
